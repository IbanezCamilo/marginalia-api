# ── H2 in-memory datasource (replaces PostgreSQL for tests) ──────────────────
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# Hibernate owns the schema in tests (create-drop); Flyway is only for dev/prod Postgres.
spring.flyway.enabled=false

# ── JWT (test values, not secrets) ────────────────────────────────────────────
jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci10ZXN0cy0xMjM0NTY3ODkw
jwt.expiration=86400000

# ── Frontend (CORS) ───────────────────────────────────────────────────────────
frontend.url=http://localhost:3000

# ── Owner seed user ───────────────────────────────────────────────────────────
owner.email=admin@test.com
owner.password=TestPassword1

# ── Cookies ───────────────────────────────────────────────────────────────────
app.cookie.secure=false
app.cookie.domain=

# ── Storage ───────────────────────────────────────────────────────────────────
app.base-url=http://localhost:8080
storage.local.upload-dir=test-uploads

# ── SpringDoc (disabled in tests) ─────────────────────────────────────────────
springdoc.api-docs.enabled=false
