# ── Cookie ────────────────────────────────────────────────────────────────────
app.cookie.secure=true
app.cookie.domain=${APP_COOKIE_DOMAIN}

# ── Proxy / Forwarded Headers ─────────────────────────────────────────────────
# NATIVE: Tomcat rewrites remoteAddr and scheme from X-Forwarded-* headers.
# Only enable when deployed behind a trusted reverse proxy that overwrites (not appends) these headers.
server.forward-headers-strategy=NATIVE
app.rate-limit.trust-forwarded-for=true

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.info.env.enabled=false

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate

# ── SpringDoc (disabled in production) ───────────────────────────────────────
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
