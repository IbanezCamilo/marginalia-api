    spring.application.name=blog-literario

    # ── Database ──────────────────────────────────────────────────────────────────
    spring.datasource.url=${DB_URL}
    spring.datasource.username=${DB_USERNAME}
    spring.datasource.password=${DB_PASSWORD}
    spring.datasource.driver-class-name=org.postgresql.Driver

    # ── JPA / Hibernate ───────────────────────────────────────────────────────────
    spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
    spring.jpa.hibernate.ddl-auto=validate
    spring.jpa.open-in-view=false

    # ── Flyway ────────────────────────────────────────────────────────────────────
    # Existing databases (created previously via ddl-auto=update) are baselined onto
    # V1 instead of replaying it; fresh databases run V1 from empty.
    spring.flyway.baseline-on-migrate=true
    spring.flyway.baseline-version=1

    # ── JWT ───────────────────────────────────────────────────────────────────────
    jwt.secret=${JWT_SECRET}
    jwt.expiration=${JWT_EXPIRATION:900000}
    jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

    # ── Server ────────────────────────────────────────────────────────────────────
    server.port=8080
    frontend.url=${FRONTEND_URL}

    # ── Rate Limiting ─────────────────────────────────────────────────────────────
    # Only set to true when deployed behind a reverse proxy that overwrites
    # X-Forwarded-For (otherwise clients can spoof it to bypass the auth rate limit).
    app.rate-limit.trust-forwarded-for=false

    # ── Admin seed user ───────────────────────────────────────────────────────────
    admin.email=${ADMIN_EMAIL}
    admin.password=${ADMIN_PASSWORD}

    # ── Account Lockout ───────────────────────────────────────────────────────────
    # Lock an account for duration-minutes after max-attempts consecutive failed logins.
    app.security.lockout.max-attempts=5
    app.security.lockout.duration-minutes=15

    # ── File Upload ───────────────────────────────────────────────────────────────
    spring.servlet.multipart.max-file-size=5MB
    spring.servlet.multipart.max-request-size=6MB

    # ── HikariCP Connection Pool ──────────────────────────────────────────────────
    spring.datasource.hikari.max-lifetime=1800000
    spring.datasource.hikari.idle-timeout=600000
    spring.datasource.hikari.connection-timeout=30000
    spring.datasource.hikari.validation-timeout=5000
    spring.datasource.hikari.minimum-idle=5
    spring.datasource.hikari.maximum-pool-size=10

    # ── Storage ───────────────────────────────────────────────────────────────────
    # Selects the active StorageService implementation: "local" (default) or "r2".
    storage.active=${STORAGE_ACTIVE:local}
    storage.local.upload-dir=uploads
    app.base-url=${APP_BASE_URL:http://localhost:8080}

    # ── Cloudflare R2 (only used when storage.active=r2) ──────────────────────────
    # Secrets must come from the environment — never commit real values.
    storage.r2.account-id=${R2_ACCOUNT_ID:}
    storage.r2.access-key-id=${R2_ACCESS_KEY_ID:}
    storage.r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}
    storage.r2.bucket-name=${R2_BUCKET_NAME:marginalia-media}
    storage.r2.public-base-url=${R2_PUBLIC_BASE_URL:}

    # ── Cookies ───────────────────────────────────────────────────────────────────
    # false in dev (HTTP), true in prod (HTTPS) — override with APP_COOKIE_SECURE env var
    app.cookie.secure=${APP_COOKIE_SECURE:false}
    # empty in dev; set to your-domain.com in prod
    app.cookie.domain=

    # ── RFC 7807 Problem Details ──────────────────────────────────────────────────
    spring.mvc.problemdetails.enabled=true

    # ── Actuator ─────────────────────────────────────────────────────────────────
    management.endpoints.web.exposure.include=health,info,metrics
    management.endpoint.health.show-details=when-authorized
    management.info.env.enabled=false

    # ── Logging ───────────────────────────────────────────────────────────────────
    logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n

    # ── Upload Storage Health ─────────────────────────────────────────────────────
    storage.health.min-free-space-mb=100

    # ── Graceful Shutdown ─────────────────────────────────────────────────────────
    server.shutdown=graceful
    spring.lifecycle.timeout-per-shutdown-phase=20s

    # ── Virtual Threads (Java 21) ─────────────────────────────────────────────────
    spring.threads.virtual.enabled=true

    # ── Response Compression ──────────────────────────────────────────────────────
    server.compression.enabled=true
    server.compression.mime-types=application/json,application/problem+json,text/plain
    server.compression.min-response-size=1024

    # ── SpringDoc OpenAPI ─────────────────────────────────────────────────────────
    springdoc.api-docs.path=/api/docs
    springdoc.swagger-ui.path=/api/swagger-ui
    springdoc.swagger-ui.enabled=false
    springdoc.api-docs.enabled=false
